name = "tvbox-source-aggregator"
main = "src/cf-entry.ts"
compatibility_date = "2024-12-30"
compatibility_flags = ["nodejs_compat"]

# 自定义域名（可选，推荐配置）
# 取消注释并替换为你自己的域名和 Zone ID
routes = [
   { pattern = "tvbox.xiaoy93.ccwu.cc/*", zone_id = "becae77b602e7b46724581ebd4130a5e" }
 ]

[triggers]
crons = ["0 5 * * *"]  # 每天 UTC 5:00（北京时间 13:00）运行，可按需调整

[[kv_namespaces]]
binding = "KV"
id = "c4355938628c47198e3e4c17511f40b2"
preview_id = "432E6C30E7E049CCA0FCBF6CF90DD07d"

[vars]
SPEED_TIMEOUT_MS = "5000"   # 源地址延迟阈值（毫秒）
SITE_TIMEOUT_MS = "3000"    # 站点 API 延迟阈值（毫秒）
FETCH_TIMEOUT_MS = "5000"   # 抓取配置 JSON 超时（毫秒）
WORKER_BASE_URL = ""  # CF 边缘代理依赖此配置（JAR/MacCMS/直播源代理）
